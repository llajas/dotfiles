# roles/common_packages/tasks/main.yml
- name: Initialise list
  set_fact:
    pkg_list: []

- name: Build list for {{ ansible_facts.distribution }}
  vars:
    candidate: >-
      {{ (item.get(ansible_facts.distribution) or item.get(ansible_facts.os_family) or item.name) }}
  set_fact:
    pkg_list: "{{ pkg_list + [candidate] }}"
  loop: "{{ development_tools }}"
  when:
    - item is mapping
    - candidate is not none
    - candidate | length > 0        # ignore empty strings

- name: Install development tools with package manager command
  ansible.builtin.command:
    cmd: "pacman -S --needed --noconfirm {{ pkg_list | unique | join(' ') }}"
  when:
    - pkg_list | length > 0
    - ansible_facts.distribution == "Archlinux"
  register: arch_package_install
  changed_when: "' there is nothing to do' not in arch_package_install.stdout"

- name: Install development tools with package module
  ansible.builtin.package:
    name: "{{ pkg_list | unique }}"
    state: present
  when:
    - pkg_list | length > 0
    - ansible_facts.distribution != "Archlinux"
